name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: GliFlow-windows.exe
            exe_path: dist/GliFlow.exe
          - os: macos-latest
            artifact: GliFlow-macos.zip
            exe_path: dist/GliFlow.app
          - os: ubuntu-latest
            artifact: GliFlow-linux
            exe_path: dist/GliFlow

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Linux system dependencies ──────────────────────────────────────────
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-tk \
            libayatana-appindicator3-dev \
            gir1.2-ayatanaappindicator3-0.1 \
            libgirepository1.0-dev \
            gcc \
            libcairo2-dev \
            pkg-config \
            python3-dev \
            xvfb

      # ── macOS system dependencies ──────────────────────────────────────────
      - name: Install macOS system deps
        if: runner.os == 'macOS'
        run: brew install portaudio

      # ── Windows system dependencies ───────────────────────────────────────
      # sounddevice ships its own PortAudio DLL on Windows — nothing extra needed

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1

      - name: Build executable (Windows / Linux)
        if: runner.os != 'macOS'
        run: pyinstaller gliflow.spec --clean --noconfirm

      - name: Build executable (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller gliflow.spec --clean --noconfirm

      # ── Package artifacts ─────────────────────────────────────────────────
      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ../GliFlow-macos.zip GliFlow.app
          cd ..

      - name: Rename Linux binary
        if: runner.os == 'Linux'
        run: cp dist/GliFlow GliFlow-linux

      - name: Rename Windows binary
        if: runner.os == 'Windows'
        run: cp dist/GliFlow.exe GliFlow-windows.exe

      # ── Upload build artifact ─────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 30

  # ── Create GitHub Release when a tag is pushed ────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            GliFlow-windows.exe
            GliFlow-macos.zip
            GliFlow-linux
          generate_release_notes: true
